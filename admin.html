<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="adminSidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-cog"></i> Admin Panel</h2>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#dashboard" class="sidebar-link active" data-section="dashboard">
                    <i class="fas fa-tachometer-alt"></i> <span>Dashboard</span>
                </a></li>
                <li><a href="#profile" class="sidebar-link" data-section="profile">
                    <i class="fas fa-user"></i> <span>Profile</span>
                </a></li>
                <li><a href="#projects-manage" class="sidebar-link" data-section="projects-manage">
                    <i class="fas fa-briefcase"></i> <span>Projects</span>
                </a></li>
                <li><a href="#skills-manage" class="sidebar-link" data-section="skills-manage">
                    <i class="fas fa-code"></i> <span>Skills</span>
                </a></li>
                <li><a href="#messages" class="sidebar-link" data-section="messages">
                    <i class="fas fa-envelope"></i> <span>Messages</span>
                </a></li>
                <li><a href="#resume-upload" class="sidebar-link" data-section="resume-upload">
                    <i class="fas fa-file-pdf"></i> <span>Resume</span>
                </a></li>
            </ul>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </button>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <!-- Dashboard -->
            <section id="dashboard" class="admin-section active">
                <div class="section-header">
                    <h2>Dashboard Overview</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-eye"></i></div>
                        <div class="stat-info">
                            <h3 id="visitorCount">0</h3>
                            <p>Total Visitors</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                        <div class="stat-info">
                            <h3 id="messageCount">0</h3>
                            <p>Messages</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
                        <div class="stat-info">
                            <h3 id="projectCount">0</h3>
                            <p>Projects</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-code"></i></div>
                        <div class="stat-info">
                            <h3 id="skillCount">0</h3>
                            <p>Skills</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Profile Section -->
            <section id="profile" class="admin-section">
                <div class="section-header">
                    <h2>Profile Management</h2>
                </div>
                <form id="profileForm" class="admin-form">
                    <div class="form-group">
                        <label>Profile/Logo Image (Single Image for Both)</label>
                        <input type="file" id="singleImage" accept="image/*">
                        <div class="image-preview">
                            <img id="imagePreview" src="" alt="Preview">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="editName" required>
                        </div>
                        <div class="form-group">
                            <label>Designation</label>
                            <input type="text" id="editDesignation" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>About / Bio</label>
                        <textarea id="editBio" rows="3" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="editEmail" required>
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="editPhone" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="editLocation" required>
                    </div>
                    <div class="form-group">
                        <label>Social Links</label>
                        <div class="social-inputs">
                            <input type="url" id="editGithub" placeholder="GitHub URL">
                            <input type="url" id="editLinkedin" placeholder="LinkedIn URL">
                            <input type="url" id="editTwitter" placeholder="Twitter URL">
                            <input type="url" id="editInstagram" placeholder="Instagram URL">
                            <input type="url" id="editWhatsapp" placeholder="WhatsApp Number (with country code)">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </form>
            </section>

            <!-- Projects Management -->
            <section id="projects-manage" class="admin-section">
                <div class="section-header">
                    <h2>Projects Management</h2>
                    <button class="btn btn-primary" onclick="showAddProjectForm()">
                        <i class="fas fa-plus"></i> Add Project
                    </button>
                </div>
                <div id="projectFormContainer" class="form-container" style="display: none;">
                    <h3 id="projectFormTitle">Add New Project</h3>
                    <form id="projectForm">
                        <input type="hidden" id="projectId">
                        <div class="form-group">
                            <label>Cover Image * (16:9 ratio recommended)</label>
                            <input type="file" id="projectImage" accept="image/*">
                        </div>
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" id="projectTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Description *</label>
                            <textarea id="projectDesc" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="projectDate" required>
                        </div>
                        <div class="form-group">
                            <label>Documentation (PDF/DOC/Link)</label>
                            <input type="file" id="projectDoc" accept=".pdf,.doc,.docx">
                            <input type="url" id="projectDocLink" placeholder="Or paste documentation link">
                        </div>
                        <div class="form-group">
                            <label>GitHub Repository Link</label>
                            <input type="url" id="projectGithub" placeholder="https://github.com/...">
                        </div>
                        <div class="form-group">
                            <label>Video Link (YouTube/Drive/MP4)</label>
                            <input type="url" id="projectVideo" placeholder="Video URL">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Project</button>
                            <button type="button" class="btn btn-secondary" onclick="hideProjectForm()">Cancel</button>
                        </div>
                    </form>
                </div>
                <div class="projects-list" id="adminProjectsList"></div>
            </section>

            <!-- Skills Management -->
            <section id="skills-manage" class="admin-section">
                <div class="section-header">
                    <h2>Skills Management</h2>
                    <button class="btn btn-primary" onclick="showAddSkillForm()">
                        <i class="fas fa-plus"></i> Add Skill
                    </button>
                </div>
                <div id="skillFormContainer" class="form-container" style="display: none;">
                    <h3 id="skillFormTitle">Add New Skill</h3>
                    <form id="skillForm">
                        <input type="hidden" id="skillId">
                        <div class="form-group">
                            <label>Skill Title *</label>
                            <input type="text" id="skillTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Description *</label>
                            <textarea id="skillDesc" rows="3" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Certificate (PDF/Image/Link)</label>
                            <input type="file" id="skillCert" accept=".pdf,.jpg,.jpeg,.png">
                            <input type="url" id="skillCertLink" placeholder="Or paste certificate link">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Skill</button>
                            <button type="button" class="btn btn-secondary" onclick="hideSkillForm()">Cancel</button>
                        </div>
                    </form>
                </div>
                <div class="skills-list" id="adminSkillsList"></div>
            </section>

            <!-- Messages Section -->
            <section id="messages" class="admin-section">
                <div class="section-header">
                    <h2>Contact Messages</h2>
                </div>
                <div id="messagesList"></div>
            </section>

            <!-- Resume Upload -->
            <section id="resume-upload" class="admin-section">
                <div class="section-header">
                    <h2>Resume Upload</h2>
                </div>
                <form id="resumeForm">
                    <div class="form-group">
                        <label>Upload Resume (PDF)</label>
                        <input type="file" id="resumeFile" accept=".pdf">
                    </div>
                    <button type="submit" class="btn btn-primary">Upload Resume</button>
                </form>
                <div id="currentResume" style="margin-top: 20px;"></div>
            </section>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
